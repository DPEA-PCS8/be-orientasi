spring:
  application:
    name: orientasi
    
  # Database Configuration
  datasource:
    url: jdbc:sqlserver://${DB_HOST}:${DB_PORT};databaseName=${DB_NAME};encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    
  # Run SQL scripts on startup
  sql:
    init:
      mode: always
      continue-on-error: true
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        "[format_sql]": true 
    
  # LDAP Configuration
  ldap:
    urls: ${LDAP_URL}
    base: ${LDAP_BASE}
  
  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
      enabled: true

server:
  port: 8080
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

# RSA Encryption Configuration
rsa:
  encryption:
    private-key: ${RSA_PRIVATE_KEY}
    public-key: ${RSA_PUBLIC_KEY}
    
# API Security Configuration
app:
  api-key: ${API_KEY}

# Logging
logging:
  level:
    "[com.pcs8.orientasi]": INFO
    "[org.springframework.security]": DEBUG

# Minio Configuration
minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET:kkad}